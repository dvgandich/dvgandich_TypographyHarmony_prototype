name: Test Harmony Model

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchinfo numpy pandas matplotlib scikit-learn gradio nbconvert jupyter
    
    - name: Test notebook execution
      run: |
        jupyter nbconvert --to python --execute TypographyHarmony_Prototype.ipynb --ExecutePreprocessor.timeout=600
