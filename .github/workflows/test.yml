name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchinfo numpy pandas matplotlib scikit-learn gradio
    
    - name: Check Python syntax
      run: |
        python -m py_compile *.py || true
    
    - name: Verify imports and basic functions
      run: |
        python -c '
import numpy as np
import torch
import torch.nn as nn

print("All imports OK")

def harmony_function(g, h_target, sigma):
    if h_target <= 0:
        h_target = 0.01
    if sigma <= 0:
        sigma = 0.01
    deviation = (g / h_target) - 1
    return np.exp(-(deviation ** 2) / (2 * sigma ** 2))

result = harmony_function(1.3, 1.3, 0.2)
assert 0.9 < result <= 1.0
print(f"Harmony function test passed: {result}")

class HarmonyNN(torch.nn.Module):
    def __init__(self, input_dim=11):
        super().__init__()
        self.net = torch.nn.Sequential(
            torch.nn.Linear(input_dim, 32),
            torch.nn.ReLU(),
            torch.nn.Dropout(0.2),
            torch.nn.Linear(32, 16),
            torch.nn.ReLU(),
            torch.nn.Dropout(0.2),
            torch.nn.Linear(16, 8),
            torch.nn.ReLU(),
            torch.nn.Linear(8, 1),
            torch.nn.Sigmoid()
        )
    def forward(self, x):
        return self.net(x)

model = HarmonyNN()
params = sum(p.numel() for p in model.parameters())
print(f"Neural network created. Parameters: {params}")
assert params == 1025
print("All tests passed!")
'
    
    - name: Check notebook exists
      run: |
        if [ -f "TypographyHarmony_Prototype.ipynb" ]; then
          echo "Notebook found"
        else
          echo "Notebook not found!"
          exit 1
        fi
