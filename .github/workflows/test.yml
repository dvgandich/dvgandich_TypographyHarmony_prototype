name: Test Harmony Model

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchinfo numpy pandas matplotlib scikit-learn gradio
    
    - name: Run quick test
      run: |
        python -c "
import numpy as np
import torch
import torch.nn as nn

def harmony_function(g, h_target, sigma):
    if h_target <= 0: h_target = 0.01
    if sigma <= 0: sigma = 0.01
    deviation = (g / h_target) - 1
    return np.exp(-(deviation ** 2) / (2 * sigma ** 2))

result = harmony_function(1.3, 1.3, 0.2)
assert 0.9 < result <= 1.0
print(f'Harmony test passed: {result}')

class HarmonyNN(nn.Module):
    def __init__(self, input_dim=11):
        super().__init__()
        self.net = nn.Sequential(
            nn.Linear(input_dim, 32), nn.ReLU(), nn.Dropout(0.2),
            nn.Linear(32, 16), nn.ReLU(), nn.Dropout(0.2),
            nn.Linear(16, 8), nn.ReLU(),
            nn.Linear(8, 1), nn.Sigmoid()
        )
    def forward(self, x): return self.net(x)

model = HarmonyNN()
params = sum(p.numel() for p in model.parameters())
print(f'Model created. Parameters: {params}')
print('All tests passed!')
"
    
    - name: Check notebook exists
      run: |
        if [ -f "TypographyHarmony_Prototype.ipynb" ]; then
          echo "Notebook found"
        else
          echo "Notebook not found!"
          exit 1
        fi
